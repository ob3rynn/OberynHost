<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #fff;
            padding: 20px;
        }

        .purchase {
            border: 1px solid #444;
            padding: 15px;
            margin-bottom: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
        }

        .completed {
            opacity: 0.5;
        }
    </style>
</head>
<body>

<h1>Admin Panel</h1>

<div id="purchases"></div>

<script>
let ADMIN_KEY = "";

// PROMPT FOR KEY
function authenticate() {
    const input = prompt("Enter admin key:");

    if (!input) {
        document.body.innerHTML = "<h2>Access Denied</h2>";
        return;
    }

    ADMIN_KEY = input;
}

// LOAD PURCHASES
async function loadPurchases() {
    const res = await fetch("http://localhost:3000/api/purchases", {
        headers: {
            Authorization: ADMIN_KEY
        }
    });

    if (res.status === 403) {
        document.body.innerHTML = "<h2>Unauthorized</h2>";
        return;
    }

    const data = await res.json();

    const container = document.getElementById("purchases");
    container.innerHTML = "";

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "purchase";

        if (p.status === "completed") {
            div.classList.add("completed");
        }

        div.innerHTML = `
            <p><strong>ID:</strong> ${p.id}</p>
            <p><strong>Server:</strong> ${p.serverId}</p>
            <p><strong>Email:</strong> ${p.email}</p>
            <p><strong>Name:</strong> ${p.serverName}</p>
            <p><strong>Status:</strong> ${p.status}</p>
            ${
                p.status === "pending"
                ? `<button onclick="complete(${p.id})">Mark Complete</button>`
                : ""
            }
        `;

        container.appendChild(div);
    });
}

// COMPLETE
async function complete(id) {
    await fetch("http://localhost:3000/api/complete", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: ADMIN_KEY
        },
        body: JSON.stringify({ purchaseId: id })
    });

    loadPurchases();
}

// INIT
authenticate();
loadPurchases();
</script>

</body>
</html>
