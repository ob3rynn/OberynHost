name: pelican-production

services:
  mariadb:
    image: ${MARIADB_IMAGE}
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${MARIADB_DATA_DIR}:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb-admin ping -h 127.0.0.1 -u root -p$$MARIADB_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  panel:
    image: ${PANEL_IMAGE}
    build:
      context: ../../../..
      dockerfile: deploy/pelican/production/panel/Dockerfile
      args:
        PELICAN_BASE_IMAGE: ${PANEL_BASE_IMAGE}
    user: "0:0"
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PANEL_HOST_PORT}:80"
    environment:
      XDG_DATA_HOME: /pelican-data
      APP_NAME: ${APP_NAME}
      APP_URL: ${APP_URL}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_LOCALE: ${APP_LOCALE}
      APP_TIMEZONE: ${APP_TIMEZONE}
      BEHIND_PROXY: ${BEHIND_PROXY}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION}
      SESSION_DRIVER: ${SESSION_DRIVER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    volumes:
      - ${PANEL_RUNTIME_DIR}:/pelican-data
      - ${PANEL_LOG_DIR}:/var/www/html/storage/logs
